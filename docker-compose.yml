version: "3.8"

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    networks:
      - portainer
    environment:
      POSTGRES_DB:       ${DB_NAME:-callcenter}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 512M

  # ── Backend (Node.js / Express) ────────────────────────────────────────────
  backend:
    image: ghcr.io/kaiquenascimentov4/callcenter-backend:latest
    networks:
      - portainer
    environment:
      PORT:             3001
      PUBLIC_BASE_URL:  ${PUBLIC_BASE_URL:-https://api-call.v4companyamaral.com}
      WS_PUBLIC_URL:    ${WS_PUBLIC_URL:-wss://api-call.v4companyamaral.com/media}
      NODE_ENV:         production

      # Banco de dados
      DB_HOST:          callcenter_postgres
      DB_PORT:          5432
      DB_NAME:          ${DB_NAME:-callcenter}
      DB_USER:          ${DB_USER:-postgres}
      DB_PASSWORD:      ${DB_PASSWORD}

      # Twilio
      TWILIO_ACCOUNT_SID:  ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN:   ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}

      # Gemini
      GEMINI_API_KEY:  ${GEMINI_API_KEY}
      GEMINI_MODEL:    ${GEMINI_MODEL:-gemini-2.0-flash-live-001}
      GEMINI_VOICE:    ${GEMINI_VOICE:-Kore}

      # Extras
      EMPRESA_NOME:      ${EMPRESA_NOME:-Callcenter}
      N8N_WEBHOOK_URL:   ${N8N_WEBHOOK_URL:-}

    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.callcenter-api.rule=Host(`api-call.v4companyamaral.com`)"
        - "traefik.http.routers.callcenter-api.entrypoints=websecure"
        - "traefik.http.routers.callcenter-api.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.callcenter-api.loadbalancer.server.port=3001"
        - "traefik.http.routers.callcenter-api-http.rule=Host(`api-call.v4companyamaral.com`)"
        - "traefik.http.routers.callcenter-api-http.entrypoints=web"
        - "traefik.http.middlewares.callcenter-api-https.redirectscheme.scheme=https"
        - "traefik.http.routers.callcenter-api-http.middlewares=callcenter-api-https"
      resources:
        limits:
          memory: 512M

  # ── Frontend (Next.js) ────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/kaiquenascimentov4/callcenter-frontend:latest
    networks:
      - portainer
    environment:
      NODE_ENV:           production
      PORT:               3000
      HOSTNAME:           "0.0.0.0"
      DATABASE_URL:       ${DATABASE_URL}

      # NextAuth v4 (compat)
      NEXTAUTH_URL:       https://call.v4companyamaral.com
      NEXTAUTH_SECRET:    ${NEXTAUTH_SECRET}
      # NextAuth v5 (nomes novos)
      AUTH_SECRET:        ${NEXTAUTH_SECRET}
      AUTH_URL:           https://call.v4companyamaral.com
      AUTH_TRUST_HOST:    "true"
      GOOGLE_CLIENT_ID:   ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}

      # URL do backend (proxy interno)
      BACKEND_PROXY_TARGET: http://backend:3001
      NEXT_PUBLIC_API_BASE: ""

    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.callcenter-ui.rule=Host(`call.v4companyamaral.com`)"
        - "traefik.http.routers.callcenter-ui.entrypoints=websecure"
        - "traefik.http.routers.callcenter-ui.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.callcenter-ui.loadbalancer.server.port=3000"
        - "traefik.http.routers.callcenter-ui-http.rule=Host(`call.v4companyamaral.com`)"
        - "traefik.http.routers.callcenter-ui-http.entrypoints=web"
        - "traefik.http.middlewares.callcenter-ui-https.redirectscheme.scheme=https"
        - "traefik.http.routers.callcenter-ui-http.middlewares=callcenter-ui-https"
      resources:
        limits:
          memory: 512M

networks:
  portainer:
    external: true

volumes:
  postgres-data:
