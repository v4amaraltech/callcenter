name: Build & Deploy

on:
  push:
    branches: [main, master]

jobs:
  build-backend:
    name: Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push — backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/v4amaraltech/callcenter-backend:latest
            ghcr.io/v4amaraltech/callcenter-backend:${{ github.sha }}

  build-frontend:
    name: Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push — frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/v4amaraltech/callcenter-frontend:latest
            ghcr.io/v4amaraltech/callcenter-frontend:${{ github.sha }}

  deploy:
    name: Deploy no VPS
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      # secrets não podem aparecer em `if:` — escolhe o método via env no shell
      - name: Deploy no VPS
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_USER: ${{ secrets.VPS_SSH_USER }}
          PORTAINER_WEBHOOK: ${{ secrets.PORTAINER_WEBHOOK }}
        continue-on-error: true
        run: |
          set -e
          if [ -n "$VPS_SSH_KEY" ] && [ -n "$VPS_HOST" ]; then
            echo "[deploy] SSH → $VPS_HOST"
            mkdir -p ~/.ssh
            printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            ssh -o StrictHostKeyChecking=accept-new \
              -i ~/.ssh/deploy_key \
              "${VPS_SSH_USER:-root}@${VPS_HOST}" \
              "cd /root/callcenter && git pull origin main || true && bash /root/callcenter/vps_deploy.sh"
          elif [ -n "$PORTAINER_WEBHOOK" ]; then
            echo "[deploy] Webhook Portainer"
            curl -fsS -X POST "$PORTAINER_WEBHOOK"
            echo "::warning::Após webhook, execute no VPS: bash /root/callcenter/fix_deploy.sh"
          else
            echo "::warning::Sem VPS_SSH_KEY nem PORTAINER_WEBHOOK — imagens publicadas no GHCR; atualize o stack manualmente no VPS."
          fi
