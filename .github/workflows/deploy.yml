name: Build & Deploy

on:
  push:
    branches: [main, master]

jobs:
  build-backend:
    name: Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push — backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/kaiquenascimentov4/callcenter-backend:latest
            ghcr.io/kaiquenascimentov4/callcenter-backend:${{ github.sha }}

  build-frontend:
    name: Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push — frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/kaiquenascimentov4/callcenter-frontend:latest
            ghcr.io/kaiquenascimentov4/callcenter-frontend:${{ github.sha }}

  deploy:
    name: Deploy via Portainer
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - name: Notifica Portainer para redeployar
        run: |
          if [ -n "${{ secrets.PORTAINER_WEBHOOK }}" ]; then
            curl -s -X POST "${{ secrets.PORTAINER_WEBHOOK }}"
          fi
