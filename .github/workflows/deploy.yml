name: Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "frontend/**"
      - "*.md"

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/callcenter

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/callcenter:latest
            ghcr.io/${{ github.repository_owner }}/callcenter:${{ github.sha }}

      - name: Notifica Portainer para redeployar
        run: |
          curl -X POST "${{ secrets.PORTAINER_WEBHOOK }}"
