name: Build & Deploy

on:
  push:
    branches: [main, master]

jobs:
  build-backend:
    name: Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push — backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/kaiquenascimentov4/callcenter-backend:latest
            ghcr.io/kaiquenascimentov4/callcenter-backend:${{ github.sha }}

  build-frontend:
    name: Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push — frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/kaiquenascimentov4/callcenter-frontend:latest
            ghcr.io/kaiquenascimentov4/callcenter-frontend:${{ github.sha }}

  deploy:
    name: Deploy no VPS
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      # Preferir SSH: reaplica .env após pull da imagem (webhook Portainer zera AUTH_SECRET etc.)
      - name: Deploy via SSH (recomendado)
        if: ${{ secrets.VPS_SSH_KEY != '' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_SSH_USER || 'root' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            cd /root/callcenter
            git pull origin main || true
            bash /root/callcenter/vps_deploy.sh

      # Fallback: webhook Portainer — após isso rode manualmente: bash /root/callcenter/fix_deploy.sh
      - name: Webhook Portainer (fallback)
        if: ${{ secrets.PORTAINER_WEBHOOK != '' && secrets.VPS_SSH_KEY == '' }}
        run: |
          curl -s -X POST "${{ secrets.PORTAINER_WEBHOOK }}"
          echo "::warning::Após webhook, execute no VPS: bash /root/callcenter/fix_deploy.sh"
